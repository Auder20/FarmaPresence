<div class="reportes-container">
  <h2>Reportes de Asistencia</h2>

<div class="filtros">
  <input
    type="text"
    [(ngModel)]="filtroNombre"
    (ngModelChange)="onFiltroChange()"
    placeholder="Filtrar por nombre"
  />

  <select [(ngModel)]="filtroDia" (ngModelChange)="onFiltroChange()">
    <option value="">Día</option>
    <option *ngFor="let d of dias" [value]="d">{{ d }}</option>
  </select>

  <select [(ngModel)]="filtroMes" (ngModelChange)="onFiltroChange()">
    <option value="">Mes</option>
    <option *ngFor="let m of meses" [value]="m.value">{{ m.name }}</option>
  </select>

  <select [(ngModel)]="filtroAnio" (ngModelChange)="onFiltroChange()">
    <option value="">Año</option>
    <option *ngFor="let a of anios" [value]="a">{{ a }}</option>
  </select>

  <select [(ngModel)]="filtroEstado" (ngModelChange)="onFiltroChange()">
    <option value="">-- Estado --</option>
    <option value="Presente">Presente</option>
    <option value="Tarde">Tarde</option>
    <option value="Ausente">Ausente</option>
  </select>

  <button (click)="exportarExcel()">Exportar Excel</button>
  <button (click)="exportarPDF()">Exportar PDF</button>
</div>
  <!-- -- Graficas -- -->
 <div class="graficas">
  <div class="grafica-item">
    <h3>Estado de Asistencia</h3>
    <canvas #estadoCanvas width="400" height="300"></canvas>
  </div>

  <div class="grafica-item">
    <h3>Asistencias por Mes</h3>
    <canvas #asistenciaCanvas width="400" height="300"></canvas>
  </div>

  <div class="grafica-item">
    <h3>Comparación por Empleado</h3>
    <canvas #comparacionCanvas width="400" height="300"></canvas>
  </div>
</div>

  <!-- Tabla -->
  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of reportesFiltrados">
        <td>{{ r.nombre }}</td>
        <td>{{ r.fecha }}</td>
        <td>{{ r.hora }}</td>
        <td
          [ngClass]="{
            'presente': r.estado === 'Presente',
            'ausente': r.estado === 'Ausente',
            'tarde': r.estado === 'Tarde'
          }"
        >
          {{ r.estado }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
