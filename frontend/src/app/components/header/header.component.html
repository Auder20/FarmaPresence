<header class="top-header">
  <div class="header-content">
    <div class="logo">
      <div class="custom-icon"></div>
    </div>
    <div class="title">
      <h5>DROGUERIA</h5>
      <h2>FARMACENTER</h2>
    </div>
  </div>
</header>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<nav class="navbar navbar-expand-lg navbar-custom">

  <!-- Botón hamburguesa para móvil -->
  <button
    class="menu-toggle"
    (click)="toggleMobileMenu()"
    [class.active]="mobileMenuOpen"
    aria-label="Toggle menu"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Menú: visible según mobileMenuOpen en móvil, siempre visible en desktop -->
  <ul
    class="navbar-nav"
    [class.mobile-open]="mobileMenuOpen"
  >
    <li class="nav-item">
      <a
        class="nav-link"
        [routerLink]="['/informacionInicio']"
        (click)="onMenuItemClick('inicio')"
        [class.active]="selectedNavItem === 'inicio'"
      >Inicio</a>
    </li>
       <li class="nav-item">
      <a
        class="nav-link"
        [routerLink]="['/registro-asistencia']"
        (click)="onMenuItemClick('registroAsistencia')"
        [class.active]="selectedNavItem === 'registroAsistencia'"
      >Registro de asistencia</a>
    </li>

    <li class="nav-item">
      <a
        class="nav-link"
        [routerLink]="['/reportes']"
        (click)="onMenuItemClick('reportes')"
        [class.active]="selectedNavItem === 'reportes'"
      >Reportes</a>
    </li>

    <li class="nav-item">
      <a
        class="nav-link"
        [routerLink]="['/registros']"
        (click)="onMenuItemClick('registros')"
        [class.active]="selectedNavItem === 'registros'"
      >Registro de Empleado</a>
    </li>

    <!-- Mostrar menú solo si hay usuario -->
    <li class="nav-item user-menu" *ngIf="username && username.trim().length > 0">
      <a
        class="nav-link user-account"
        href="#"
        (click)="toggleDropdown(); $event.preventDefault()"
      >
        <i class="bi bi-person"></i>
        {{ username }}
        <span class="caret">&#x25BE;</span>
      </a>
      <ul class="dropdown-menu" [class.show]="isDropdownOpen">
        <li *ngIf="userId !== null">
          <a [routerLink]="['/editar-perfil', userId]" (click)="closeDropdown(); closeMobileMenu()">
            Editar perfil
          </a>
        </li>
        <li>
          <a [routerLink]="['/agregar-usuario']" (click)="closeDropdown(); closeMobileMenu()">
            Agregar usuario
          </a>
        </li>
        <li><a href="#" (click)="logout(); closeMobileMenu()">Cerrar sesión</a></li>
      </ul>
    </li>
  </ul>
</nav>
