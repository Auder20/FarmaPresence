<div class="asistencia-container">
  <h2>Registro de Asistencia</h2>

  <form (ngSubmit)="registrarAsistencia()">
    <input
      type="text"
      placeholder="Nombre"
      [(ngModel)]="nuevoNombre"
      name="nuevoNombre"
      required
    />

    <select [(ngModel)]="nuevoEstado" name="nuevoEstado" (change)="onEstadoChange()" required>
      <option value="" disabled selected>Estado</option>
      <option value="Presente">Presente</option>
      <option value="Tarde">Tarde</option>
      <option value="Ausente">Ausente</option>
    </select>

    <input
      *ngIf="mostrarMotivo"
      type="text"
      placeholder="Motivo (opcional)"
      [(ngModel)]="nuevoMotivo"
      name="nuevoMotivo"
      required
    />

    <button type="submit">Registrar</button>
  </form>

  <ul>
    <li *ngFor="let registro of registros">
      <span>{{ registro.nombre }}</span>
      <span
        [ngClass]="{
          'presente': registro.estado === 'Presente',
          'tarde': registro.estado === 'Tarde',
          'ausente': registro.estado === 'Ausente'
        }"
      >
        {{ registro.estado }}
      </span>
      <span class="motivo" *ngIf="registro.motivo">Motivo: {{ registro.motivo }}</span>
    </li>
  </ul>
</div>
