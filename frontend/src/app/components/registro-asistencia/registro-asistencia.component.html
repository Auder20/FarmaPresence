<div class="asistencia-container">
  <h2>Registro de Asistencia en Tiempo Real</h2>

  <form (ngSubmit)="registrarAsistencia()" style="margin-bottom: 20px;">
    <input type="text" placeholder="Nombre" [(ngModel)]="nuevoNombre" name="nombre" required />
    <select [(ngModel)]="nuevoEstado" name="estado">
      <option value="Presente">Presente</option>
      <option value="Tarde">Tarde</option>
      <option value="Ausente">Ausente</option>
    </select>
    <button type="submit">Registrar</button>
  </form>

  <ul>
    <li *ngFor="let r of registros">
      <strong>{{ r.nombre }}</strong> - {{ r.hora }} -
      <span [ngClass]="{
        'presente': r.estado === 'Presente',
        'tarde': r.estado === 'Tarde',
        'ausente': r.estado === 'Ausente'
      }">
        {{ r.estado }}
      </span>
    </li>
  </ul>
</div>
