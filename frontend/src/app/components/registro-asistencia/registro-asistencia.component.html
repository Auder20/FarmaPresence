<div class="asistencia-container">
  <h2>Registro de Asistencia</h2>

  <form #formAsistencia="ngForm" novalidate>
    <select
      [(ngModel)]="nuevoEmpleadoId"
      name="nuevoEmpleadoId"
      required
      #empleadoSelect="ngModel"
    >
      <option [ngValue]="null" disabled>Selecciona un empleado</option>
      <option *ngFor="let empleado of empleados" [ngValue]="empleado.id">
        {{ empleado.nombre }}
      </option>
    </select>
    <div *ngIf="empleadoSelect.invalid && empleadoSelect.touched" class="error">
      Debes seleccionar un empleado
    </div>

    <!-- Checkbox para marcar como Ausente -->
    <div class="form-group">
      <label>
        <input
          type="checkbox"
          [(ngModel)]="ausenteSeleccionado"
          name="ausenteSeleccionado"
          (change)="onEstadoChange()"
        />
        Marcar como Ausente
      </label>
    </div>

    <!-- Campo de motivo (solo si aplica) -->
    <ng-container *ngIf="mostrarMotivo">
      <input
        type="text"
        placeholder="Motivo (requerido)"
        [(ngModel)]="nuevoMotivo"
        name="nuevoMotivo"
        required
        #motivoInput="ngModel"
        [attr.aria-required]="mostrarMotivo ? 'true' : null"
      />
      <div *ngIf="motivoInput.invalid && motivoInput.touched" class="error">
        El motivo es requerido para el estado seleccionado
      </div>
    </ng-container>

    <!-- Botón actualizado -->
    <button
      type="button"
      (click)="validarAntesDeRegistrar()"
      [disabled]="
        formAsistencia.invalid ||
        (mostrarMotivo && !nuevoMotivo.trim())
      "
    >
      Registrar Asistencia
    </button>
  </form>

  <div class="tabla-asistencias" *ngIf="asistenciasSesion.length > 0">
    <h3>Asistencias Registradas (Sesión Actual)</h3>
    <table>
      <thead>
        <tr>
          <th>Empleado</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Estado</th>
          <th>Motivo</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let asistencia of asistenciasSesion">
          <td>{{ asistencia.nombre }}</td>
          <td>{{ asistencia.fecha }}</td>
          <td>{{ asistencia.hora }}</td>
          <td>{{ asistencia.estado }}</td>
          <td>{{ asistencia.motivo }}</td>
        </tr>
      </tbody>
    </table>
    <button (click)="limpiarTabla()">Limpiar Tabla</button>
  </div>
</div>
