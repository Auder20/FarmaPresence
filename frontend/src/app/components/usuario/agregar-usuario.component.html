<div class="panel-container">
  <div class="usuario-container">
    <h2>Registro de Usuario</h2>
    <form class="usuario-form" (ngSubmit)="onSubmit()">
      <!-- Fila 1: Nombre / Identificación -->
      <div class="form-row">
        <div class="form-column">
          <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input
              type="text"
              id="nombre"
              [(ngModel)]="usuario.nombre"
              name="nombre"
              placeholder="Nombre completo"
              required
            />
          </div>
        </div>
        <div class="form-column">
          <div class="form-group">
            <label for="identificacion">Identificación:</label>
            <input
              type="text"
              id="identificacion"
              [(ngModel)]="usuario.identificacion"
              name="identificacion"
              placeholder="N° de documento de identidad"
              required
            />
          </div>
        </div>
      </div>

      <!-- Fila 2: Correo / Contraseña -->
      <div class="form-row">
        <div class="form-column">
          <div class="form-group">
            <label for="correo">Correo electrónico:</label>
            <input
              type="email"
              id="correo"
              [(ngModel)]="usuario.correo"
              name="correo"
              placeholder="Correo electrónico"
              required
            />
          </div>
        </div>
        <div class="form-column">
          <div class="form-group">
            <label for="contrasena">Contraseña:</label>
            <div class="password-wrapper">
              <input
                [type]="mostrarContrasena ? 'text' : 'password'"
                id="contrasena"
                [(ngModel)]="usuario.contrasena"
                name="contrasena"
                placeholder="Contraseña del usuario"
                required
              />
              <button type="button" (click)="toggleMostrarContrasena()" class="toggle-btn" type="button">
                {{ mostrarContrasena ? '🙈' : '👁️' }}
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Fila 3: Nombre de usuario / Rol -->
      <div class="form-row">
        <div class="form-column">
          <div class="form-group">
            <label for="nombreDeUsuario">Nombre de usuario:</label>
            <input
              type="text"
              id="nombreDeUsuario"
              [(ngModel)]="usuario.nombreDeUsuario"
              name="nombreDeUsuario"
              placeholder="Nombre de usuario"
              required
            />
          </div>
        </div>

        <div class="form-column">
          <div class="form-group">
            <label for="rol">Rol:</label>
            <select id="rol" [(ngModel)]="usuario.Rol" name="Rol" required>
              <option value="Admin">Administrador</option>
              <option value="User">Usuario Común</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Fila 4: Teléfono -->
      <div class="form-row">
        <div class="form-column">
          <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input
              type="text"
              id="telefono"
              [(ngModel)]="usuario.telefono"
              name="telefono"
              placeholder="Teléfono del usuario"
            />
          </div>
        </div>
      </div>

      <!-- Botón de envío -->
      <button type="submit" class="submit-btn">Registrar usuario</button>
    </form>
  </div>
</div>
