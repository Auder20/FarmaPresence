<div class="panel-container">
  <h2>Editar Perfil</h2>
  <form class="perfil-form" (ngSubmit)="guardarCambios()">
    <!-- ID de Usuario (solo lectura) -->
    <div class="form-group">
      <label for="id">ID de Usuario:</label>
      <input type="text" id="id" [(ngModel)]="idusuario" name="id" readonly />
    </div>

    <!-- Nombre completo y Nombre de usuario -->
    <div class="form-row">
      <div class="form-column">
        <label for="nombreCompleto">Nombre completo:</label>
        <input
          type="text"
          id="nombreCompleto"
          [(ngModel)]="nombreCompleto"
          name="nombreCompleto"
          required
        />
      </div>
      <div class="form-column">
        <label for="username">Nombre de usuario:</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          required
        />
      </div>
    </div>

    <!-- Rol y Teléfono -->
    <div class="form-row">
      <div class="form-column">
        <label for="rol">Rol:</label>
        <select id="rol" [(ngModel)]="rol" name="rol" required>
          <option value="ADMIN">Administrador</option>
          <option value="USER">Usuario Común</option>
        </select>
      </div>
      <div class="form-column">
        <label for="telefono">Teléfono:</label>
        <input
          type="text"
          id="telefono"
          [(ngModel)]="telefono"
          name="telefono"
          placeholder="Teléfono del usuario"
        />
      </div>
    </div>

    <!-- Correo electrónico -->
    <div class="form-group">
      <label for="correoElectronico">Correo electrónico:</label>
      <input
        type="email"
        id="correoElectronico"
        [(ngModel)]="correoElectronico"
        name="correoElectronico"
        required
      />
    </div>

    <!-- Botón para mostrar formulario cambio de contraseña -->
    <button type="button" (click)="toggleMostrarContrasena()" class="btn-cambiar-pass">
      {{ mostrarFormularioCambioContrasena ? 'Cancelar cambio de contraseña' : 'Cambiar contraseña' }}
    </button>

    <!-- Formulario cambio de contraseña (oculto/visible) -->
    <div *ngIf="mostrarFormularioCambioContrasena" class="form-cambio-contrasena">
      <div class="form-group">
        <label for="contrasenaActual">Contraseña Actual:</label>
        <input
          [type]="mostrarContrasena ? 'text' : 'password'"
          id="contrasenaActual"
          [(ngModel)]="contrasenaActual"
          name="contrasenaActual"
          placeholder="Escribe tu contraseña actual"
          required
        />
      </div>
      <div class="form-group">
        <label for="nuevaContrasena">Nueva Contraseña:</label>
        <input
          [type]="mostrarContrasena ? 'text' : 'password'"
          id="nuevaContrasena"
          [(ngModel)]="nuevaContrasena"
          name="nuevaContrasena"
          placeholder="Escribe la nueva contraseña"
          required
        />
      </div>
      <div class="form-group">
        <label for="confirmarContrasena">Confirmar Nueva Contraseña:</label>
        <input
          [type]="mostrarContrasena ? 'text' : 'password'"
          id="confirmarContrasena"
          [(ngModel)]="confirmarContrasena"
          name="confirmarContrasena"
          placeholder="Confirma la nueva contraseña"
          required
        />
      </div>
      <button type="button" (click)="cambiarContrasena()" class="btn-guardar-pass">Guardar Nueva Contraseña</button>
    </div>

    <!-- Botón para guardar cambios -->
    <button type="submit" class="btn-guardar-cambios">Guardar Cambios</button>
  </form>
</div>
